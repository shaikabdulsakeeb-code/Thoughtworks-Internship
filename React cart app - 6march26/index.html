<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React - Cart</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fdfbfb;
            /* Clean off-white background */
            color: #333;
        }

        /* Navbar: Added Glassmorphism and Backdrop Blur */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            background: rgba(255, 255, 255, 0.8);
            /* Semi-transparent */
            backdrop-filter: blur(10px);
            /* Blur effect for modern feel */
            height: 70px;
            position: sticky;
            top: 15px;
            width: 85vw;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        .navbar a {
            text-decoration: none;
            color: #5a2d0c;
            transition: color 0.3s ease;
        }

        .navbar a:hover {
            color: #fcb69f;
        }

        /* Card: Soft Shadows instead of Borders */
        .card {
            background-color: white;
            border-radius: 16px;
            padding: 15px;
            width: 240px;
            height: auto;
            /* Flexible height is safer for content */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Button: Modern Rounded and Animated */
        .card button {
            background-color: #5a2d0c;
            font-weight: 600;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .card button:hover {
            background-color: #7d4015;
        }

        /* Layout Adjustments */
        .main {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            gap: 30px;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            flex: 2;
        }

        /* Cart: Neater sidebar */
        .cart {
            flex: 1;
            max-width: 300px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: fit-content;
        }
    </style>

</head>

<body>

    <div id="root"></div>

    <!-- your products file -->
    <script src="script.js"></script>

    <script type="text/babel">

        function Card(props) {
            function handlebtn() {
                props.setC(props.c + 1)
                props.setCi([...props.ci, props.product])
            }

            return (<div class="card">
                <img src={props.product.image} alt="" />
                <h4 style={{ fontSize: "12px" }}>{props.product.title}</h4>
                <h5>{props.product.price}</h5>
                <button onClick={() => handlebtn()}>Add to cart</button>
            </div>)
        }
        function Products(props) {
            return (
                <div class="products">
                    {
                        myproducts.map((product) => {
                            return (<Card ci={props.ci} setCi={props.setCi} c={props.c} setC={props.setC} product={product} />)
                        })
                    }
                </div>

            )
        }
        function Cart(props) {
            // console.log(props.ci)
            return (
                <div class="cart">
                    <h1>Cart:</h1>
                    {props.ci.length == 0 ? <h3>Cart is empty </h3> : props.ci.map((item) => {
                        return (<div class="card">
                            <img src={item.image} alt="" />
                            <h3>{item.title}</h3>
                            <h4>{item.price}</h4>
                        </div>)
                    })}
                </div>
            )
        }
        function App() {
            const [c, setC] = React.useState(0)
            const [ci, setCi] = React.useState([])
            return (
                <div>
                    <div class="navbar">
                        <a href="#">Home</a>
                        <a href="#">Products</a>
                        <a href="#">About</a>
                        <span>Cart : {c}</span>
                    </div>
                    <div class="main">
                        <Products setCi={setCi} ci={ci} c={c} setC={setC} />
                        <Cart ci={ci} setCi={setCi} />
                    </div>

                </div>
            )
        }
        ReactDOM.render(<App />, document.getElementById("root"))

    </script>

</body>

</html>
